<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
<script>
  var params = new URLSearchParams(window.location.search);
  var day = params.get('day');
  
  fetch('urls.json')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data[day]) {
        window.location.href = data[day];
      } else {
        document.body.innerHTML = '해당 날짜를 찾을 수 없습니다.';
      }
    });
</script>
</body>
</html>
